# =============================================================================
# docker-compose.yml - Development & production deployment
#
# Usage:
#   docker compose up -d              # Start all services
#   docker compose --profile dev up   # Include Redis for caching
#   docker compose logs -f bot        # Tail bot logs
# =============================================================================

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prop-firm-scalp
    restart: unless-stopped
    env_file: .env
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - bot-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    image: postgres:16-alpine
    container_name: prop-firm-scalp-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: scalp
      POSTGRES_USER: scalp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scalp"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prop-firm-scalp-redis
    restart: unless-stopped
    profiles: ["dev", "full"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  bot-data:
  pg-data:
  redis-data:
